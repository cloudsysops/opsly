name: Auto-fix on push

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/admin/**'
      - 'scripts/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  review-and-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: npm ci
        run: npm ci

      - name: ESLint --fix (api + admin)
        run: |
          set +e
          npm run lint:fix -w @intcloudsysops/api || true
          npm run lint:fix -w @intcloudsysops/admin || true
          exit 0

      - name: Prettier --write
        run: |
          set +e
          if [ -f node_modules/prettier/package.json ]; then
            npx prettier --write \
              "apps/api/**/*.{ts,tsx,js,jsx,json,md}" \
              "apps/admin/**/*.{ts,tsx,js,jsx,json,md}" \
              --ignore-unknown || true
          fi
          exit 0

      - name: Open PR if changes (never commit directly to main)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -z "$(git status --porcelain)" ]; then
            echo "✅ No changes after auto-fix"
            exit 0
          fi

          DATE="$(date -u +%Y-%m-%d)"
          SHA_SHORT="$(git rev-parse --short HEAD)"
          BRANCH="auto-fix/push-${SHA_SHORT}"

          git stash push -u -m "auto-fix-${SHA_SHORT}"
          git fetch origin
          git checkout -b "${BRANCH}"
          git stash pop

          git add -A
          git commit -m "chore: auto-fix code quality on ${SHA_SHORT}"
          git push origin "HEAD:${BRANCH}"

          PR_COUNT="$(gh pr list --repo "${{ github.repository }}" \
            --head "${BRANCH}" --state open --json number --jq 'length')"
          if [ "${PR_COUNT}" = "0" ]; then
            gh pr create \
              --repo "${{ github.repository }}" \
              --base main \
              --head "${BRANCH}" \
              --title "chore: auto-fix code quality (${DATE} ${SHA_SHORT})" \
              --body "Automated ESLint/Prettier fixes triggered by push to main.
Triggered by commit \`${SHA_SHORT}\`. Review before merging.

Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo "PR already open for ${BRANCH}; skipping."
          fi

          echo "✅ PR created (not direct push) for branch ${BRANCH}"
