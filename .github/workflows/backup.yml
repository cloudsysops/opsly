# Backup diario en el VPS (tenants). Requiere SSH al staging/prod según secrets.
#
# Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY, DISCORD_WEBHOOK_URL (opcional)

name: Backup tenants

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ejecutar backup en VPS
        id: backup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/opsly
            ./scripts/backup-tenants.sh

      - name: Notificar Discord (éxito)
        if: success()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL no configurado; omitiendo notificación"
            exit 0
          fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "Backup tenants OK" \
              --arg ts "$TS" \
              '{embeds:[{title:$title,color:3066993,timestamp:$ts}]}')"

      - name: Notificar Discord (fallo)
        if: failure()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL no configurado; omitiendo notificación"
            exit 0
          fi
          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{embeds:[{title:"Backup tenants fallido",color:15158332,fields:[{name:"Run",value:$url}]}]}')"
