name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm ci + build ml package
        run: |
          set -euo pipefail
          npm ci
          # Build ml first (required by api)
          cd apps/ml && npm run build

      - name: TypeScript (api + admin + portal + mcp + orchestrator + ml + llm-gateway + context-builder)
        run: |
          set -euo pipefail
          (cd apps/api && npx tsc --noEmit) & pid1=$!
          (cd apps/admin && npx tsc --noEmit) & pid2=$!
          (cd apps/portal && npx tsc --noEmit) & pid3=$!
          (cd apps/mcp && npx tsc --noEmit) & pid4=$!
          (cd apps/orchestrator && npx tsc --noEmit) & pid5=$!
          (cd apps/ml && npx tsc --noEmit) & pid6=$!
          (cd apps/llm-gateway && npx tsc --noEmit) & pid7=$!
          (cd apps/context-builder && npx tsc --noEmit) & pid8=$!
          status=0
          wait $pid1 || status=1
          wait $pid2 || status=1
          wait $pid3 || status=1
          wait $pid4 || status=1
          wait $pid5 || status=1
          wait $pid6 || status=1
          wait $pid7 || status=1
          wait $pid8 || status=1
          exit $status

      - name: ESLint si existe config (paralelo)
        run: |
          set -euo pipefail
          run_eslint() {
            dir="$1"
            if compgen -G "${dir}/eslint.config.*" >/dev/null 2>&1 \
              || [ -f "${dir}/.eslintrc.json" ] \
              || [ -f "${dir}/.eslintrc.cjs" ] \
              || [ -f "${dir}/.eslintrc.js" ]; then
              (cd "$dir" && npx eslint .)
            else
              echo "No ESLint config in ${dir}, skipping"
            fi
          }
          run_eslint apps/api & pid1=$!
          run_eslint apps/admin & pid2=$!
          run_eslint apps/portal & pid3=$!
          run_eslint apps/mcp & pid4=$!
          run_eslint apps/orchestrator & pid5=$!
          run_eslint apps/ml & pid6=$!
          run_eslint apps/llm-gateway & pid7=$!
          run_eslint apps/context-builder & pid8=$!
          status=0
          wait $pid1 || status=1
          wait $pid2 || status=1
          wait $pid3 || status=1
          wait $pid4 || status=1
          wait $pid5 || status=1
          wait $pid6 || status=1
          wait $pid7 || status=1
          wait $pid8 || status=1
          exit $status

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: npm ci + tests (api/portal/mcp/orchestrator/ml/llm-gateway)
        run: |
          set -euo pipefail
          npm ci
          # Build internal packages first (required for tests that import them)
          (cd apps/ml && npm run build)
          (cd apps/llm-gateway && npm run build)
          # api: 241+ tests — critical to run on every PR
          (cd apps/api && npm test) & pid_api=$!
          (cd apps/portal && npm test) & pid0=$!
          (cd apps/mcp && npm test) & pid1=$!
          (cd apps/orchestrator && npm test) & pid2=$!
          (cd apps/ml && npm test) & pid3=$!
          (cd apps/llm-gateway && npm test) & pid4=$!
          status=0
          wait $pid_api || status=1
          wait $pid0 || status=1
          wait $pid1 || status=1
          wait $pid2 || status=1
          wait $pid3 || status=1
          wait $pid4 || status=1
          exit $status

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm ci + build all packages (ml, llm-gateway, api, admin, portal)
        run: |
          set -euo pipefail
          npm ci
          # Build internal packages first
          (cd apps/ml && npm run build)
          (cd apps/llm-gateway && npm run build)
          # Then build apps in parallel
          (cd apps/api && npm run build) & pid1=$!
          (cd apps/admin && npm run build) & pid2=$!
          (cd apps/portal && npm run build) & pid3=$!
          status=0
          wait $pid1 || status=1
          wait $pid2 || status=1
          wait $pid3 || status=1
          exit $status

  scripts-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n (scripts/*.sh)
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in scripts/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Instalar shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: shellcheck scripts/*.sh
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Solo fallar en issues severity=error (el repo histórico tiene muchos style/info)
          shellcheck -S error scripts/*.sh

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog — scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  e2e-invite:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm ci
        run: |
          npm ci
      - name: Run E2E invite script
        run: |
          export ADMIN_TOKEN="${{ secrets.PLATFORM_ADMIN_TOKEN }}"
          export OWNER_EMAIL="jkbotero78@gmail.com"
          export TENANT_SLUG="localrank"
          bash scripts/test-e2e-invite-flow.sh

      - name: Run Playwright E2E tests (portal with Supabase)
        run: |
          export NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          export NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          export PORTAL_URL="https://portal.ops.smiletripcare.com"
          npm run test:e2e --workspace=@intcloudsysops/portal
