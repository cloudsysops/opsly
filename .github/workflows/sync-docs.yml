# Regenera docs/IMPLEMENTATION-STATUS.md y metadatos en status.yaml tras cambios relevantes.
# Evita bucles: no corre si el último commit contiene [docs-sync].

name: Sync Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/implementation/status.yaml"
      - "apps/orchestrator/src/workers/ApprovalGateWorker.ts"
      - "packages/types/src/approval.ts"
      - "supabase/migrations/**"
      - "scripts/sync-docs.js"
      - "scripts/patch-status-yaml-ci.js"
      - ".github/workflows/sync-docs.yml"

permissions:
  contents: write

concurrency:
  group: sync-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[docs-sync]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Patch status.yaml (CI metadata)
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/patch-status-yaml-ci.js

      - name: Generate IMPLEMENTATION-STATUS.md
        run: npm run docs:sync

      - name: Commit and push if changed
        id: commit
        run: |
          echo "changed=false" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/implementation/status.yaml docs/IMPLEMENTATION-STATUS.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(docs): auto-sync implementation status [docs-sync]"
          if git push origin "HEAD:${{ github.ref_name }}"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::git push failed (permisos o protección de rama)."
          fi

      - name: Discord notification
        if: success() && steps.commit.outputs.changed == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          DOCS_URL="https://github.com/${GITHUB_REPOSITORY}/blob/main/docs/IMPLEMENTATION-STATUS.md"
          export SHORT_SHA DOCS_URL
          PAYLOAD=$(python3 <<'PY'
          import json, os
          sha = os.environ["SHORT_SHA"]
          url = os.environ["DOCS_URL"]
          body = {
            "embeds": [{
              "title": "Docs sincronizados",
              "description": "Implementation status regenerado desde `status.yaml`.",
              "color": 3066993,
              "fields": [
                {"name": "Commit", "value": "`" + sha + "`", "inline": True},
                {"name": "Docs", "value": url, "inline": False},
              ],
            }]
          }
          print(json.dumps(body))
          PY
          )
          curl -sS -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL" || echo "::warning::Discord POST failed"
