# Opsly — workflow catalog: docs/ops/workflows-index.md
name: Guardian Shield Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/guardian-shield/**'
      - 'apps/security-bots/**'
      - '1-agent-teams/**'
      - '.github/workflows/guardian-shield-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: guardian-shield-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  security-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Run security tests
        run: npm run test --workspace=@intcloudsysops/guardian-shield
        continue-on-error: true

      - name: SAST scan
        run: |
          echo "Running static analysis..."
          npm run lint --workspace=@intcloudsysops/guardian-shield || true

  build:
    runs-on: ubuntu-latest
    needs: security-checks
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Build Guardian Shield
        run: npm run build --workspace=@intcloudsysops/guardian-shield

      - name: Build security bots
        run: npm run build --workspace=@intcloudsysops/security-bots

  test-integration:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Integration tests
        run: npm run test:integration --workspace=@intcloudsysops/guardian-shield
        env:
          POSTGRES_URL: postgresql://postgres:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379

  approve-deployment:
    runs-on: ubuntu-latest
    needs: [security-checks, build, test-integration]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check deployment approval
        run: |
          echo "Deployment ready for approval"
          echo "All security checks passed"

      - name: Log deployment readiness
        run: |
          echo "Guardian Shield deployment ready to proceed"
          echo "Environment: ${{ github.event.inputs.environment || 'staging' }}"
