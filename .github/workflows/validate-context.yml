name: Validate agent context

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: OpenAPI YAML (parse + estructura mínima)
        run: npm run validate-openapi

      - name: Skills (manifest + SKILL.md)
        run: npm run validate-skills

      - name: Tests skills-manifest
        run: npm run test-skills-manifest

      - name: system_state.json es JSON válido
        run: |
          python3 -m json.tool context/system_state.json > /dev/null
          echo "✅ system_state.json válido"

      - name: Servicios documentados en AGENTS.md
        run: |
          FAIL=0
          for app in apps/*/; do
            name=$(basename "$app")
            if ! grep -q "$name" AGENTS.md; then
              echo "❌ apps/$name no está en AGENTS.md"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 0 ]; then
            echo "✅ Todos los servicios documentados"
          fi
          exit "$FAIL"

      - name: .github/AGENTS.md apunta a la fuente canónica
        run: |
          if [ -L .github/AGENTS.md ] && [ "$(readlink .github/AGENTS.md)" = "../AGENTS.md" ]; then
            echo "✅ .github/AGENTS.md → ../AGENTS.md (symlink, ADR-034)"
            exit 0
          fi
          if ! diff -q AGENTS.md .github/AGENTS.md > /dev/null 2>&1; then
            echo "❌ AGENTS.md y .github/AGENTS.md divergen (y no es symlink canónico)"
            echo "Ver docs/adr/ADR-034-ci-hygiene.md"
            exit 1
          fi
          echo "✅ Mismo contenido (modo legado); preferir symlink → ../AGENTS.md"
