# Secrets requeridos (repository o environment "production"):
#   VPS_HOST, VPS_USER, VPS_SSH_KEY, PLATFORM_DOMAIN
#   Pull GHCR en el VPS (job deploy): usa github.token + github.actor (permiso packages:read del workflow).
#     Los paquetes intcloudsysops-* están ligados a este repo → el token del Actions puede hacer pull.
#   GHCR_PAT / GHCR_USER (opcional): solo para login manual en el VPS fuera de Actions; ver doppler / docs.
#   DISCORD_WEBHOOK_URL (opcional; si falta, los steps de Discord hacen no-op)
#   PLATFORM_DOMAIN: dominio base sin subdominio (ej. ops.smiletripcare.com). Debe coincidir con
#   .env del VPS para compose; el health check usa https://api.${PLATFORM_DOMAIN}/api/health
#
# Secrets para build de imágenes (valores desde Doppler prd u origen equivalente):
#   gh secret set NEXT_PUBLIC_SUPABASE_URL --repo cloudsysops/opsly
#   gh secret set NEXT_PUBLIC_SUPABASE_ANON_KEY --repo cloudsysops/opsly
#   gh secret set PLATFORM_DOMAIN --repo cloudsysops/opsly
#   PLATFORM_DOMAIN también se usa en job deploy (health SSH). La API usa build-arg PLATFORM_DOMAIN
#   para CORS (origen admin); el admin usa NEXT_PUBLIC_* y NEXT_PUBLIC_API_URL construida en el workflow.
#
# El resto de variables de .env deben definirse en el environment "production"
# de GitHub y/o inyectarse en el VPS con Doppler (no van en texto plano en este YAML).
#
# OPSLY_CONFIG_SYNC: valores públicos desde config/opsly.config.json (scripts/sync-config.sh)
# VPS_HOST (secret) debe coincidir con infrastructure.vps_ip del JSON.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Omitir lint, typecheck y eslint"
        type: boolean
        required: false
        default: false

jobs:
  lint-and-typecheck:
    if: github.event_name != 'workflow_dispatch' || inputs.skip_tests != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm ci (workspace)
        run: npm ci

      - name: Typecheck (parallel)
        run: |
          set -euo pipefail
          (cd apps/api && npx tsc --noEmit) & pid1=$!
          (cd apps/admin && npx tsc --noEmit) & pid2=$!
          (cd apps/portal && npx tsc --noEmit) & pid3=$!
          wait $pid1 $pid2 $pid3

  build-and-push:
    needs: lint-and-typecheck
    if: |
      always() &&
      (needs.lint-and-typecheck.result == 'success' || needs.lint-and-typecheck.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/cloudsysops/intcloudsysops-api:latest
          build-args: |
            PLATFORM_DOMAIN=${{ secrets.PLATFORM_DOMAIN }}

      - name: Build and push Admin image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ghcr.io/cloudsysops/intcloudsysops-admin:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_URL=https://api.${{ secrets.PLATFORM_DOMAIN }}

      - name: Build and push Portal image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/portal/Dockerfile
          push: true
          tags: ghcr.io/cloudsysops/intcloudsysops-portal:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_URL=https://api.${{ secrets.PLATFORM_DOMAIN }}
            NEXT_PUBLIC_SUPPORT_EMAIL=${{ secrets.NEXT_PUBLIC_SUPPORT_EMAIL }}
            NEXT_PUBLIC_PLATFORM_DOMAIN=${{ secrets.PLATFORM_DOMAIN }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          PLATFORM_DOMAIN: ${{ secrets.PLATFORM_DOMAIN }}
          GITHUB_DEPLOY_TOKEN: ${{ github.token }}
          GITHUB_DEPLOY_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: PLATFORM_DOMAIN,GITHUB_DEPLOY_TOKEN,GITHUB_DEPLOY_ACTOR
          script: |
            set -euo pipefail

            DEPLOY_PATH=/opt/opsly
            REPO_URL=git@github.com:cloudsysops/opsly.git

            cd "$DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main

            # Imágenes app/admin/portal vienen de GHCR; no hace falta npm ci en el VPS (evita OOM / exit 137).

            cd /opt/opsly/infra
            if [ -z "${GITHUB_DEPLOY_TOKEN:-}" ] || [ -z "${GITHUB_DEPLOY_ACTOR:-}" ]; then
              echo "GITHUB_DEPLOY_TOKEN o GITHUB_DEPLOY_ACTOR vacíos (token del workflow)" >&2
              exit 1
            fi
            # Evita credenciales viejas en ~/.docker/config.json que provoquen 403 tras un login “Succeeded”.
            docker logout ghcr.io 2>/dev/null || true
            if ! echo "$GITHUB_DEPLOY_TOKEN" | docker login ghcr.io -u "$GITHUB_DEPLOY_ACTOR" --password-stdin; then
              echo "docker login ghcr.io (github.token) falló" >&2
              exit 1
            fi
            # Imágenes efectivas del compose (respeta APP_IMAGE / PORTAL_APP_IMAGE en .env). Pull secuencial: error claro por tag.
            tmp_imgs="$(mktemp)"
            docker compose --env-file /opt/opsly/.env -f docker-compose.platform.yml config --images | sort -u >"$tmp_imgs"
            while IFS= read -r img; do
              [ -z "$img" ] && continue
              case "$img" in ghcr.io/*) ;;
                *) echo "Omitiendo pull (no GHCR): $img"
                   continue ;;
              esac
              echo "Pulling $img ..."
              if ! docker pull "$img"; then
                rm -f "$tmp_imgs"
                echo "❌ Pull GHCR falló: $img" >&2
                echo "Comprueba: packages ligados a cloudsysops/opsly; job deploy con permissions packages:read;" >&2
                echo "GITHUB_DEPLOY_ACTOR acorde a la cuenta que disparó el workflow; políticas org de Actions/token." >&2
                echo "https://github.com/orgs/cloudsysops/packages?repo_name=opsly" >&2
                exit 1
              fi
            done <"$tmp_imgs"
            rm -f "$tmp_imgs"
            docker compose --env-file /opt/opsly/.env -f docker-compose.platform.yml up -d --no-deps traefik app admin portal

            if [ -z "${PLATFORM_DOMAIN:-}" ]; then
              echo "PLATFORM_DOMAIN no está definido" >&2
              exit 1
            fi
            echo "Esperando que Traefik registre routers..."
            sleep 60
            for i in 1 2 3 4 5; do
              if curl -sfk "https://api.${PLATFORM_DOMAIN}/api/health"; then
                echo "✅ Health OK en intento $i"
                break
              fi
              echo "Intento $i/5 fallido, esperando 15s..."
              sleep 15
              if [ "$i" -eq 5 ]; then
                echo "❌ Health falló después de 5 intentos"
                exit 1
              fi
            done

            echo "Deploy completado: $(date -u)"

      - name: Notify Discord on success
        if: success()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then echo "Discord omitido (DISCORD_WEBHOOK_URL vacío)"; exit 0; fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg sha "${{ github.sha }}" \
              --arg actor "${{ github.actor }}" \
              --arg ts "$TS" \
              '{embeds:[{title:"✅ Deploy exitoso",color:65416,fields:[{name:"Commit",value:$sha,inline:true},{name:"Author",value:$actor,inline:true}],timestamp:$ts}]}')"

      - name: Notify Discord on failure
        if: failure()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then echo "Discord omitido (DISCORD_WEBHOOK_URL vacío)"; exit 0; fi
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg sha "${{ github.sha }}" \
              --arg actor "${{ github.actor }}" \
              --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{embeds:[{title:"❌ Deploy fallido",color:16729156,fields:[{name:"Commit",value:$sha,inline:true},{name:"Author",value:$actor,inline:true},{name:"Logs",value:$url,inline:false}]}]}')"
