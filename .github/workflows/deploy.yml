# Secrets requeridos (repository o environment "production"):
#   VPS_HOST, VPS_USER, VPS_SSH_KEY, PLATFORM_DOMAIN
#   TAILSCALE_AUTHKEY (opcional pero recomendado si SSH del VPS es solo tailnet / UFW bloquea 22 público):
#     clave reusable+ephemeral (crear en consola Tailscale; si tu política exige tags, el tag va en la clave/ACL, no hace falta
#     duplicarlo aquí salvo que uses un secreto TAILSCALE_TAGS con el action; ver docs/runbooks/DEPLOY-GITHUB-ACTIONS.md).
#     Tras el paso "Connect Tailscale", el runner alcanza VPS_HOST si es la IP MagicDNS / Tailscale del VPS.
#   TAILSCALE_TAGS (opcional): p. ej. tag:github-actions — solo si el action lo requiere; muchas claves funcionan sin este campo.
#   VPS_SSH_HOST (opcional): si está definido, appleboy usa este host en lugar de VPS_HOST (útil: IP Tailscale
#     para SSH mientras VPS_HOST se usa solo para health/DNS en otros contextos).
#   Pull GHCR en el VPS (job deploy): usa github.token + github.actor (permiso packages:read del workflow).
#     Los paquetes intcloudsysops-* están ligados a este repo → el token del Actions puede hacer pull.
#   GHCR_PAT / GHCR_USER (opcional): solo para login manual en el VPS fuera de Actions; ver doppler / docs.
#   DISCORD_WEBHOOK_URL (opcional; si falta, los steps de Discord hacen no-op)
#   PLATFORM_DOMAIN: dominio base sin subdominio (ej. ops.smiletripcare.com). Debe coincidir con
#   .env del VPS para compose; el health check usa https://api.${PLATFORM_DOMAIN}/api/health
#
# Staging (rama `staging` → VPS /opt/opsly-staging):
#   Secret recomendado: STAGING_PLATFORM_DOMAIN (dominio base igual que PLATFORM_DOMAIN, ej. staging.ops.example.com).
#   Si está vacío, el build usa PLATFORM_DOMAIN como fallback (solo para desbloquear CI).
#
# Secrets para build de imágenes (valores desde Doppler prd u origen equivalente):
#   gh secret set NEXT_PUBLIC_SUPABASE_URL --repo cloudsysops/opsly
#   gh secret set NEXT_PUBLIC_SUPABASE_ANON_KEY --repo cloudsysops/opsly
#   gh secret set PLATFORM_DOMAIN --repo cloudsysops/opsly
#   PLATFORM_DOMAIN también se usa en job deploy (health SSH). La API usa build-arg PLATFORM_DOMAIN
#   para CORS (origen admin); el admin usa NEXT_PUBLIC_* y NEXT_PUBLIC_API_URL construida en el workflow.
#
# El resto de variables de .env deben definirse en el environment "production"
# de GitHub y/o inyectarse en el VPS con Doppler (no van en texto plano en este YAML).
#
# OPSLY_CONFIG_SYNC: valores públicos desde config/opsly.config.json (scripts/sync-config.sh)
# VPS_HOST (secret) debe coincidir con infrastructure.vps_ip del JSON.
#
# Despliegue Node/PM2 (job deploy-pm2-vps):
#   Ramas: main → DEPLOY_DIR=/opt/opsly, PM2_NAME=opsly-prod
#          staging → DEPLOY_DIR=/opt/opsly-staging, PM2_NAME=opsly-staging
#   Requiere en el VPS: repo clonable (SSH deploy key o credencial git), Node/npm, supabase CLI
#   vinculado si se usa db push, y ecosystem.config.js en DEPLOY_DIR (o ajustar el fallback pm2 start).
#   Secretos SSH: VPS_HOST, VPS_USER (o VPS_USERNAME como alias en la UI; el workflow usa VPS_USER),
#   VPS_SSH_KEY

name: Deploy

on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Omitir lint, typecheck y eslint"
        type: boolean
        required: false
        default: false

jobs:
  lint-and-typecheck:
    if: github.event_name != 'workflow_dispatch' || inputs.skip_tests != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm ci (workspace)
        run: npm ci

      - name: Typecheck (parallel)
        run: |
          set -euo pipefail
          (cd apps/api && npx tsc --noEmit) & pid1=$!
          (cd apps/admin && npx tsc --noEmit) & pid2=$!
          (cd apps/portal && npx tsc --noEmit) & pid3=$!
          (cd apps/mcp && npx tsc --noEmit) & pid4=$!
          (cd apps/orchestrator && npx tsc --noEmit) & pid5=$!
          (cd apps/ml && npx tsc --noEmit) & pid6=$!
          (cd apps/llm-gateway && npx tsc --noEmit) & pid7=$!
          (cd apps/context-builder && npx tsc --noEmit) & pid8=$!
          wait $pid1 $pid2 $pid3 $pid4 $pid5 $pid6 $pid7 $pid8

  build-and-push:
    needs: lint-and-typecheck
    if: |
      always() &&
      (needs.lint-and-typecheck.result == 'success' || needs.lint-and-typecheck.result == 'skipped') &&
      github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Validate required build secrets
        env:
          PLATFORM_DOMAIN: ${{ secrets.PLATFORM_DOMAIN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for key in PLATFORM_DOMAIN NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-api:latest
            ghcr.io/cloudsysops/intcloudsysops-api:${{ github.sha }}
          build-args: |
            PLATFORM_DOMAIN=${{ secrets.PLATFORM_DOMAIN }}

      - name: Build and push Admin image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-admin:latest
            ghcr.io/cloudsysops/intcloudsysops-admin:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_URL=https://api.${{ secrets.PLATFORM_DOMAIN }}

      - name: Build and push Portal image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/portal/Dockerfile
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-portal:latest
            ghcr.io/cloudsysops/intcloudsysops-portal:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_URL=https://api.${{ secrets.PLATFORM_DOMAIN }}
            NEXT_PUBLIC_SUPPORT_EMAIL=${{ secrets.NEXT_PUBLIC_SUPPORT_EMAIL }}
            NEXT_PUBLIC_PLATFORM_DOMAIN=${{ secrets.PLATFORM_DOMAIN }}

      - name: Build and push LLM Gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/llm-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-llm-gateway:latest
            ghcr.io/cloudsysops/intcloudsysops-llm-gateway:${{ github.sha }}

      - name: Build and push Orchestrator image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/orchestrator/Dockerfile
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-orchestrator:latest
            ghcr.io/cloudsysops/intcloudsysops-orchestrator:${{ github.sha }}

      - name: Build and push Hermes image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.hermes
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-hermes:latest
            ghcr.io/cloudsysops/intcloudsysops-hermes:${{ github.sha }}

      - name: Build and push Context Builder image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/context-builder/Dockerfile
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-context-builder:latest
            ghcr.io/cloudsysops/intcloudsysops-context-builder:${{ github.sha }}

  build-mcp:
    needs: lint-and-typecheck
    if: |
      always() &&
      (needs.lint-and-typecheck.result == 'success' || needs.lint-and-typecheck.result == 'skipped') &&
      github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push MCP image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/mcp/Dockerfile
          push: true
          tags: ghcr.io/cloudsysops/intcloudsysops-mcp:latest

  # --- Staging: imágenes etiqueta :staging (solo rama staging) ---
  build-and-push-staging:
    needs: lint-and-typecheck
    if: |
      always() &&
      (needs.lint-and-typecheck.result == 'success' || needs.lint-and-typecheck.result == 'skipped') &&
      github.ref_name == 'staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve staging domain for build-args
        id: staging_domain
        env:
          SD: ${{ secrets.STAGING_PLATFORM_DOMAIN }}
          PD: ${{ secrets.PLATFORM_DOMAIN }}
        run: |
          set -euo pipefail
          DOM="${SD:-$PD}"
          if [ -z "$DOM" ]; then
            echo "Definir al menos PLATFORM_DOMAIN o STAGING_PLATFORM_DOMAIN en secrets" >&2
            exit 1
          fi
          echo "domain=$DOM" >> "$GITHUB_OUTPUT"
          if [ -z "${SD:-}" ]; then
            echo "::warning::STAGING_PLATFORM_DOMAIN vacío; usando PLATFORM_DOMAIN para build staging"
          fi

      - name: Build and push API image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-api:staging
            ghcr.io/cloudsysops/intcloudsysops-api:${{ github.sha }}
          build-args: |
            PLATFORM_DOMAIN=${{ steps.staging_domain.outputs.domain }}

      - name: Build and push Admin image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-admin:staging
            ghcr.io/cloudsysops/intcloudsysops-admin:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_URL=https://api.${{ steps.staging_domain.outputs.domain }}

      - name: Build and push Portal image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/portal/Dockerfile
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-portal:staging
            ghcr.io/cloudsysops/intcloudsysops-portal:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_URL=https://api.${{ steps.staging_domain.outputs.domain }}
            NEXT_PUBLIC_SUPPORT_EMAIL=${{ secrets.NEXT_PUBLIC_SUPPORT_EMAIL }}
            NEXT_PUBLIC_PLATFORM_DOMAIN=${{ steps.staging_domain.outputs.domain }}

      - name: Build and push LLM Gateway image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/llm-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-llm-gateway:staging
            ghcr.io/cloudsysops/intcloudsysops-llm-gateway:${{ github.sha }}

      - name: Build and push Orchestrator image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/orchestrator/Dockerfile
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-orchestrator:staging
            ghcr.io/cloudsysops/intcloudsysops-orchestrator:${{ github.sha }}

      - name: Build and push Hermes image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.hermes
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-hermes:staging
            ghcr.io/cloudsysops/intcloudsysops-hermes:${{ github.sha }}

      - name: Build and push Context Builder image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/context-builder/Dockerfile
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-context-builder:staging
            ghcr.io/cloudsysops/intcloudsysops-context-builder:${{ github.sha }}

  build-mcp-staging:
    needs: lint-and-typecheck
    if: |
      always() &&
      (needs.lint-and-typecheck.result == 'success' || needs.lint-and-typecheck.result == 'skipped') &&
      github.ref_name == 'staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push MCP image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/mcp/Dockerfile
          push: true
          tags: |
            ghcr.io/cloudsysops/intcloudsysops-mcp:staging
            ghcr.io/cloudsysops/intcloudsysops-mcp:${{ github.sha }}

  deploy-staging:
    needs:
      - build-and-push-staging
      - build-mcp-staging
    if: github.ref_name == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate required deploy secrets (staging)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          PLATFORM_DOMAIN: ${{ secrets.PLATFORM_DOMAIN }}
          STAGING_PLATFORM_DOMAIN: ${{ secrets.STAGING_PLATFORM_DOMAIN }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${VPS_USER:-}" ]; then
            echo "Missing required secret: VPS_USER" >&2
            missing=1
          fi
          if [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "Missing required secret: VPS_SSH_KEY" >&2
            missing=1
          fi
          if [ -z "${VPS_SSH_HOST:-}" ] && [ -z "${VPS_HOST:-}" ]; then
            echo "Missing required secret: VPS_SSH_HOST or VPS_HOST" >&2
            missing=1
          fi
          if [ -z "${STAGING_PLATFORM_DOMAIN:-}" ] && [ -z "${PLATFORM_DOMAIN:-}" ]; then
            echo "Missing required secret: STAGING_PLATFORM_DOMAIN or PLATFORM_DOMAIN" >&2
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Connect Tailscale for SSH to VPS (tailnet)
        if: secrets.TAILSCALE_AUTHKEY != ''
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: 1.94.2

      - name: Deploy staging via SSH (compose)
        uses: appleboy/ssh-action@v1.0.3
        env:
          STAGING_PLATFORM_DOMAIN: ${{ secrets.STAGING_PLATFORM_DOMAIN }}
          PLATFORM_DOMAIN_FALLBACK: ${{ secrets.PLATFORM_DOMAIN }}
          GITHUB_DEPLOY_TOKEN: ${{ github.token }}
          GITHUB_DEPLOY_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_SSH_HOST || secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 2m
          envs: STAGING_PLATFORM_DOMAIN,PLATFORM_DOMAIN_FALLBACK,GITHUB_DEPLOY_TOKEN,GITHUB_DEPLOY_ACTOR
          script: |
            set -euo pipefail
            DEPLOY_PATH=/opt/opsly-staging
            REPO_URL=git@github.com:cloudsysops/opsly.git
            HEALTH_DOMAIN="${STAGING_PLATFORM_DOMAIN:-}"
            if [ -z "$HEALTH_DOMAIN" ]; then
              HEALTH_DOMAIN="${PLATFORM_DOMAIN_FALLBACK:-}"
            fi
            if [ -z "$HEALTH_DOMAIN" ]; then
              echo "Definir STAGING_PLATFORM_DOMAIN o PLATFORM_DOMAIN en secrets para health check" >&2
              exit 1
            fi

            mkdir -p "$(dirname "$DEPLOY_PATH")"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "Clonando repo en $DEPLOY_PATH (rama staging)..."
              git clone "$REPO_URL" "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            git fetch origin staging
            git checkout staging
            git reset --hard origin/staging

            cd "$DEPLOY_PATH/infra"
            docker logout ghcr.io 2>/dev/null || true
            echo "$GITHUB_DEPLOY_TOKEN" | docker login ghcr.io -u "$GITHUB_DEPLOY_ACTOR" --password-stdin

            echo "Pulling staging images..."
            docker compose --env-file "$DEPLOY_PATH/.env" -f docker-compose.platform.yml pull traefik app admin portal prometheus node-exporter || true
            docker compose --env-file "$DEPLOY_PATH/.env" -f docker-compose.platform.yml pull mcp llm-gateway orchestrator hermes context-builder || true

            docker compose --env-file "$DEPLOY_PATH/.env" -f docker-compose.platform.yml up -d --no-deps --force-recreate traefik app admin portal prometheus node-exporter
            docker compose --env-file "$DEPLOY_PATH/.env" -f docker-compose.platform.yml up -d --no-deps --force-recreate mcp llm-gateway orchestrator hermes context-builder || true

            echo "Esperando Traefik (staging)..."
            sleep 45
            for i in 1 2 3 4 5; do
              if curl -sfk "https://api.${HEALTH_DOMAIN}/api/health"; then
                echo "✅ Health staging OK (intento $i)"
                exit 0
              fi
              echo "Intento $i/5..."
              sleep 15
            done
            echo "❌ Health staging falló" >&2
            exit 1

      - name: Notify Discord (staging OK)
        if: success()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then exit 0; fi
          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" \
            -d "$(jq -n --arg sha "${{ github.sha }}" --arg actor "${{ github.actor }}" \
              '{embeds:[{title:"✅ Staging deploy OK",color:3066993,fields:[{name:"Commit",value:$sha},{name:"Actor",value:$actor}]}]}')"

      - name: Notify Discord (staging fallo)
        if: failure()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then exit 0; fi
          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" -H "Content-Type: application/json" \
            -d "$(jq -n --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{embeds:[{title:"❌ Staging deploy fallido",color:15158332,fields:[{name:"Run",value:$url}]}]}')"

  # Git + npm + Supabase + PM2 en el VPS (legacy). Desactivado: el despliegue oficial es Docker (jobs deploy / deploy-staging).
  deploy-pm2-vps:
    name: Deploy Node/PM2 on VPS (SSH) [legacy desactivado]
    # Evita npm/supabase/pm2 en VPS en paralelo a Docker (deploy / deploy-staging). Reactivar: quitar `if: false` y restaurar `needs` + condición.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (clone si falta, pull, npm, supabase, pm2 reload)
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_DIR: ${{ github.ref_name == 'main' && '/opt/opsly' || '/opt/opsly-staging' }}
          PM2_NAME: ${{ github.ref_name == 'main' && 'opsly-prod' || 'opsly-staging' }}
          GIT_BRANCH: ${{ github.ref_name }}
          REPO_SSH_URL: git@github.com:${{ github.repository }}.git
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_DIR,PM2_NAME,GIT_BRANCH,REPO_SSH_URL
          script: |
            set -euo pipefail
            echo "PM2 deploy: branch=${GIT_BRANCH} DEPLOY_DIR=${DEPLOY_DIR} PM2_NAME=${PM2_NAME}"

            if [ ! -d "${DEPLOY_DIR}/.git" ]; then
              echo "Sin repo en ${DEPLOY_DIR}; clonando ${REPO_SSH_URL} ..."
              PARENT="$(dirname "${DEPLOY_DIR}")"
              if [ ! -d "${PARENT}" ]; then
                sudo mkdir -p "${PARENT}" 2>/dev/null || mkdir -p "${PARENT}"
              fi
              if [ -e "${DEPLOY_DIR}" ] && [ ! -d "${DEPLOY_DIR}/.git" ]; then
                echo "Error: ${DEPLOY_DIR} existe y no es un repositorio git" >&2
                exit 1
              fi
              git clone "${REPO_SSH_URL}" "${DEPLOY_DIR}"
            fi

            cd "${DEPLOY_DIR}"
            git remote set-url origin "${REPO_SSH_URL}" || true
            git fetch origin "${GIT_BRANCH}"
            git checkout "${GIT_BRANCH}"
            git pull origin "${GIT_BRANCH}"

            npm install --production

            npx supabase db push

            pm2 reload "${PM2_NAME}" --update-env || pm2 start ecosystem.config.js --name "${PM2_NAME}"

            echo "Deployed to ${GIT_BRANCH} successfully (PM2 ${PM2_NAME} @ ${DEPLOY_DIR})"

  deploy:
    needs:
      - build-and-push
      - build-mcp
    # Solo producción: imágenes GHCR + compose. En staging este job no corre (build-* están skipped).
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate required deploy secrets (production)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          PLATFORM_DOMAIN: ${{ secrets.PLATFORM_DOMAIN }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "${VPS_USER:-}" ]; then
            echo "Missing required secret: VPS_USER" >&2
            missing=1
          fi
          if [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "Missing required secret: VPS_SSH_KEY" >&2
            missing=1
          fi
          if [ -z "${VPS_SSH_HOST:-}" ] && [ -z "${VPS_HOST:-}" ]; then
            echo "Missing required secret: VPS_SSH_HOST or VPS_HOST" >&2
            missing=1
          fi
          if [ -z "${PLATFORM_DOMAIN:-}" ]; then
            echo "Missing required secret: PLATFORM_DOMAIN" >&2
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Connect Tailscale for SSH to VPS (tailnet)
        if: secrets.TAILSCALE_AUTHKEY != ''
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: 1.94.2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          PLATFORM_DOMAIN: ${{ secrets.PLATFORM_DOMAIN }}
          GITHUB_DEPLOY_TOKEN: ${{ github.token }}
          GITHUB_DEPLOY_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_SSH_HOST || secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 2m
          envs: PLATFORM_DOMAIN,GITHUB_DEPLOY_TOKEN,GITHUB_DEPLOY_ACTOR
          script: |
            set -euo pipefail

            DEPLOY_PATH=/opt/opsly
            REPO_URL=git@github.com:cloudsysops/opsly.git

            cd "$DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main

            # Imágenes app/admin/portal vienen de GHCR; no hace falta npm ci en el VPS (evita OOM / exit 137).

            cd /opt/opsly/infra
            # Invocación explícita (no COMPOSE_CMD en variable): el login shell del VPS puede ser zsh y
            # no hace word-splitting en $COMPOSE_CMD pull → "no such file or directory".
            if [ -z "${GITHUB_DEPLOY_TOKEN:-}" ] || [ -z "${GITHUB_DEPLOY_ACTOR:-}" ]; then
              echo "GITHUB_DEPLOY_TOKEN o GITHUB_DEPLOY_ACTOR vacíos (token del workflow)" >&2
              exit 1
            fi
            # Evita credenciales viejas en ~/.docker/config.json que provoquen 403 tras un login “Succeeded”.
            docker logout ghcr.io 2>/dev/null || true
            if ! echo "$GITHUB_DEPLOY_TOKEN" | docker login ghcr.io -u "$GITHUB_DEPLOY_ACTOR" --password-stdin; then
              echo "docker login ghcr.io (github.token) falló" >&2
              exit 1
            fi
            # Core runtime must always deploy. Optional services are best-effort.
            echo "Pulling core services (required)..."
            docker compose --env-file /opt/opsly/.env -f docker-compose.platform.yml pull traefik app admin portal prometheus node-exporter
            echo "Pulling optional services (best-effort)..."
            docker compose --env-file /opt/opsly/.env -f docker-compose.platform.yml pull mcp llm-gateway orchestrator hermes context-builder || true

            # --force-recreate: evita réplicas app (deploy.replicas: 2) quedando en Created mientras otras siguen Up.
            docker compose --env-file /opt/opsly/.env -f docker-compose.platform.yml up -d --no-deps --force-recreate traefik app admin portal prometheus node-exporter
            # Optional services: no bloquear deploy si falta imagen/tag.
            docker compose --env-file /opt/opsly/.env -f docker-compose.platform.yml up -d --no-deps --force-recreate mcp llm-gateway orchestrator hermes context-builder || true

            if [ -z "${PLATFORM_DOMAIN:-}" ]; then
              echo "PLATFORM_DOMAIN no está definido" >&2
              exit 1
            fi
            echo "Esperando que Traefik registre routers..."
            sleep 60
            for i in 1 2 3 4 5; do
              if curl -sfk "https://api.${PLATFORM_DOMAIN}/api/health"; then
                echo "✅ Health OK en intento $i"
                break
              fi
              echo "Intento $i/5 fallido, esperando 15s..."
              sleep 15
              if [ "$i" -eq 5 ]; then
                echo "❌ Health falló después de 5 intentos"
                exit 1
              fi
            done

            echo "Deploy completado: $(date -u)"

      - name: Notify Discord on success
        if: success()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then echo "Discord omitido (DISCORD_WEBHOOK_URL vacío)"; exit 0; fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg sha "${{ github.sha }}" \
              --arg actor "${{ github.actor }}" \
              --arg ts "$TS" \
              '{embeds:[{title:"✅ Deploy exitoso",color:65416,fields:[{name:"Commit",value:$sha,inline:true},{name:"Author",value:$actor,inline:true}],timestamp:$ts}]}')"

      - name: Notify Discord on failure
        if: failure()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then echo "Discord omitido (DISCORD_WEBHOOK_URL vacío)"; exit 0; fi
          curl -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg sha "${{ github.sha }}" \
              --arg actor "${{ github.actor }}" \
              --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{embeds:[{title:"❌ Deploy fallido",color:16729156,fields:[{name:"Commit",value:$sha,inline:true},{name:"Author",value:$actor,inline:true},{name:"Logs",value:$url,inline:false}]}]}')"
