# =============================================================================
# bug_report.yml — Formulario de reporte de bug (GitHub Issue Forms)
# =============================================================================
# Qué hace: define campos estructurados al crear un issue tipo “bug”.
# Cuándo se activa: el usuario elige “Reporte de bug” en New issue.
# Reutilizar: copia el YAML, cambia labels y opciones de entorno; valida en
#   GitHub → Settings → General → Issues (formularios habilitados).
#
# .yml vs .md en ISSUE_TEMPLATE:
# - Los .yml (issue forms) generan formularios con validación, dropdowns y tipos
#   de campo; GitHub valida el esquema.
# - Los .md son plantillas libres en Markdown: más flexibles pero sin campos
#   obligatorios ni listas cerradas. Este repo usa .yml para bugs puntuales.
# =============================================================================

name: Reporte de bug
description: Algo no funciona como debería
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por el reporte. Cuanta más información (sin secretos), más rápido podremos reproducirlo.

  - type: textarea
    id: description
    attributes:
      label: Descripción
      description: Qué ocurre, dónde lo viste y en qué contexto.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Lista numerada, idealmente desde un estado limpio.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Entorno
      description: Dónde se reproduce el problema.
      options:
        - vps-prod
        - staging
        - local
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs relevantes
      description: Fragmentos de logs, trazas o respuestas HTTP (sin tokens, claves ni PII).
      render: shell

  - type: textarea
    id: tenant_impact
    attributes:
      label: Impacto en tenants activos
      description: ¿Afecta a un tenant concreto, a todos o solo a la plataforma? Incluye slug si aplica (sin datos sensibles).

  - type: dropdown
    id: severity
    attributes:
      label: Severidad
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
