openapi: 3.0.3
info:
  title: Opsly Platform API
  version: 1.0.0
  description: >
    Referencia OpenAPI de las rutas públicas del monorepo Opsly.
    Base URL: `https://api.<PLATFORM_DOMAIN>`.
    También disponible con prefijo `/api/v1/` (rewrite automático, misma semántica).
    Autenticación admin: `Authorization: Bearer <PLATFORM_ADMIN_TOKEN>`.
    Rutas portal usan JWT Supabase. Rutas health son públicas.
servers:
  - url: https://api.example.com
    description: Producción (sustituir por dominio real)
  - url: https://api.ops.smiletripcare.com
    description: Staging

paths:
  /api/health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Estado del servicio y checks
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                  checks:
                    type: object
                    properties:
                      supabase:
                        type: string
                        enum: [ok, degraded, error, skipped]
                      redis:
                        type: string
                        enum: [ok, degraded, error, skipped]

  /api/metrics:
    get:
      summary: Métricas agregadas de tenants + MRR
      operationId: getMetrics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Conteos y MRR
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_tenants:
                    type: integer
                  active_tenants:
                    type: integer
                  suspended_tenants:
                    type: integer
                  mrr_usd:
                    type: number
                  tenants_by_plan:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/metrics/system:
    get:
      summary: Métricas de host (Prometheus o mock)
      operationId: getSystemMetrics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: CPU, RAM, disco, uptime, contadores
          content:
            application/json:
              schema:
                type: object
                properties:
                  cpu_percent:
                    type: number
                  ram_used_gb:
                    type: number
                  ram_total_gb:
                    type: number
                  disk_used_gb:
                    type: number
                  disk_total_gb:
                    type: number
                  uptime_seconds:
                    type: integer
                  active_tenants:
                    type: integer
                  containers_running:
                    type: integer
                  mock:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/tenants:
    get:
      summary: Listar tenants
      operationId: listTenants
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
        - name: plan
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Lista paginada
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Crear tenant (orquestación async)
      operationId: createTenant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, owner_email, plan]
              properties:
                slug:
                  type: string
                owner_email:
                  type: string
                  format: email
                plan:
                  type: string
                  enum: [startup, business, enterprise, demo]
                stripe_customer_id:
                  type: string
      responses:
        '202':
          description: Aceptado — provisión en curso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  slug:
                    type: string
                  status:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Slug duplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api/tenants/{id}:
    get:
      summary: Obtener tenant por UUID o slug
      operationId: getTenant
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantRef'
      responses:
        '200':
          description: Tenant y estado del stack
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Actualizar nombre o plan
      operationId: patchTenant
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                plan:
                  type: string
      responses:
        '200':
          description: Registro actualizado
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Eliminar tenant (orquestación)
      operationId: deleteTenant
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Eliminado
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/portal/me:
    get:
      summary: Sesión portal — datos tenant y salud de URLs
      operationId: getPortalMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payload portal
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/portal/mode:
    post:
      summary: Establecer modo developer | managed
      operationId: postPortalMode
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [developer, managed]
      responses:
        '200':
          description: Actualizado
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/portal/usage:
    get:
      summary: Métricas LLM del tenant de la sesión (sin slug en path)
      operationId: getPortalUsage
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [today, month]
      responses:
        '200':
          description: Agregados de uso LLM (mismo contrato que admin por tenant)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/portal/billing/summary:
    get:
      summary: Resumen facturación — asentado (Postgres) + pendiente (Redis) + proyección fin de mes
      operationId: getPortalBillingSummary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Totales USD del mes en curso (UTC)
          content:
            application/json:
              schema:
                type: object
                required:
                  - period_start
                  - period_end
                  - currency
                  - settled_cost_usd
                  - pending_cost_usd
                  - current_total_usd
                  - projected_month_end_usd
                  - daily_average_usd
                properties:
                  period_start:
                    type: string
                    format: date
                  period_end:
                    type: string
                    format: date
                  currency:
                    type: string
                    example: USD
                  settled_cost_usd:
                    type: number
                  pending_cost_usd:
                    type: number
                  current_total_usd:
                    type: number
                  projected_month_end_usd:
                    type: number
                  daily_average_usd:
                    type: number
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Error al consultar billing_usage

  /api/portal/tenant/{slug}/me:
    get:
      summary: Sesión portal — mismo payload que /api/portal/me si el slug coincide con el tenant JWT
      operationId: getPortalTenantMeBySlug
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payload portal
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/portal/tenant/{slug}/mode:
    post:
      summary: Establecer modo developer | managed con validación de slug en ruta
      operationId: postPortalTenantModeBySlug
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [developer, managed]
      responses:
        '200':
          description: Actualizado
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/portal/tenant/{slug}/usage:
    get:
      summary: Métricas LLM con validación de slug en ruta (Zero-Trust)
      operationId: getPortalTenantUsageBySlug
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [today, month]
      responses:
        '200':
          description: Agregados de uso LLM
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/portal/tenant/{slug}/insights:
    get:
      summary: Insights predictivos (churn, forecast, anomalías) — Zero-Trust por slug
      operationId: getPortalTenantInsights
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista de insights activos del tenant
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      summary: Marcar insight como leído, descartado o accionado
      operationId: patchPortalTenantInsight
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [insight_id, action]
              properties:
                insight_id:
                  type: string
                  format: uuid
                action:
                  type: string
                  enum: [read, dismiss, action]
      responses:
        '200':
          description: Actualizado
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/portal/health:
    get:
      summary: Health check público (Uptime Kuma) — requiere ?slug= del tenant
      operationId: getPortalHealthPublic
      parameters:
        - name: slug
          in: query
          required: true
          description: Slug del tenant (3–30 chars, pattern a-z0-9-)
          schema:
            type: string
            minLength: 3
            maxLength: 30
            pattern: "^[a-z0-9-]+$"
      responses:
        '200':
          description: Health del tenant (n8n + Uptime reachable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  slug:
                    type: string
                  name:
                    type: string
                  plan:
                    type: string
                  status:
                    type: string
                  services:
                    type: object
                    properties:
                      n8n_url:
                        type: string
                        nullable: true
                      uptime_url:
                        type: string
                        nullable: true
                  health:
                    type: object
                    properties:
                      n8n_reachable:
                        type: boolean
                      uptime_reachable:
                        type: boolean
                      checked_at:
                        type: string
                        format: date-time
        '400':
          description: Slug inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '404':
          description: Tenant no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/portal/tenant/{slug}/health:
    get:
      summary: Health del tenant de la sesión (Zero-Trust — slug validado con JWT)
      operationId: getPortalTenantHealthBySlug
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Health del tenant (mismo contrato que /api/portal/health)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: El slug del path no coincide con el tenant del JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '404':
          description: Tenant no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/portal/tenant/{slug}/budget:
    get:
      summary: Presupuesto IA mensual del tenant (Zero-Trust)
      operationId: getPortalTenantBudget
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Presupuesto configurado (o null si no hay override)
          content:
            application/json:
              schema:
                type: object
                properties:
                  slug:
                    type: string
                  monthly_cap_usd:
                    type: number
                    nullable: true
                  alert_threshold_pct:
                    type: integer
                    minimum: 1
                    maximum: 100
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    put:
      summary: Establece un presupuesto mensual personalizado para el tenant
      operationId: putPortalTenantBudget
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [monthly_cap_usd]
              properties:
                monthly_cap_usd:
                  type: number
                  minimum: 0.01
                alert_threshold_pct:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 80
      responses:
        '200':
          description: Presupuesto guardado
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/portal/tenant/{slug}/subscription/upgrade:
    post:
      summary: Sube el plan de suscripción del tenant (startup → business/enterprise)
      operationId: postPortalTenantSubscriptionUpgrade
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:
                  type: string
                  enum: [business, enterprise]
      responses:
        '200':
          description: Plan actualizado en Stripe y en DB
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  plan:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/cron/sync-stripe-usage:
    get:
      summary: Sincroniza consumo de tokens IA con Stripe Usage Records
      operationId: cronSyncStripeUsage
      description: >
        Programar diariamente. Requiere `Authorization: Bearer <CRON_SECRET>` o `x-cron-secret`.
        Reporta tokens acumulados del período de facturación activo por tenant.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Resultado de la sincronización
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenants_synced:
                    type: integer
                  tenants_skipped:
                    type: integer
                  total_tokens:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/feedback:
    post:
      summary: Feedback portal — mensaje con JWT (tenant/email desde sesión)
      description: >
        `message` obligatorio. `tenant_slug` y `user_email` opcionales; si se envían deben coincidir con el JWT.
        Identidad vía `resolveTrustedFeedbackIdentity` (Fase 4 §7).
      operationId: postFeedback
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                tenant_slug:
                  type: string
                  description: Debe coincidir con el tenant de la sesión si se envía
                user_email:
                  type: string
                  description: Debe coincidir con el email de la sesión si se envía
                session_id:
                  type: string
                conversation_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Respuesta del asistente y metadatos de decisión si aplica
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation_id:
                    type: string
                  message:
                    type: string
                  decision_type:
                    type: string
                    nullable: true
                    description: auto_implement | needs_approval | rejected | scheduled
                  criticality:
                    type: string
                    nullable: true
                    description: low | medium | high | critical
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      summary: Listar conversaciones de feedback (admin)
      description: >
        Requiere `PLATFORM_ADMIN_TOKEN` en `Authorization: Bearer` o cabecera `x-admin-token`.
      operationId: listFeedbackConversations
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Lista paginada de conversaciones con decisiones anidadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  feedbacks:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/docs:
    get:
      summary: Swagger UI interactiva
      operationId: getSwaggerUI
      tags: [docs]
      description: Interfaz Swagger UI (CDN) cargando `/openapi.yaml`.
      responses:
        '200':
          description: HTML de Swagger UI
          content:
            text/html:
              schema:
                type: string

  /api/v1:
    get:
      summary: Información de versión de la API
      operationId: getApiVersion
      tags: [meta]
      responses:
        '200':
          description: Versión y links
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: "1"
                  status:
                    type: string
                    example: stable
                  docs:
                    type: string
                  openapi:
                    type: string

  /api/tenants/{id}/webhooks:
    get:
      summary: Listar webhooks del tenant
      operationId: listTenantWebhooks
      tags: [webhooks]
      security:
        - AdminBearer: []
        - AdminToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Tenant slug o UUID
      responses:
        '200':
          description: Lista de webhooks (sin secret)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookPublic'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Crear webhook outbound
      operationId: createTenantWebhook
      tags: [webhooks]
      security:
        - AdminBearer: []
        - AdminToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookBody'
      responses:
        '201':
          description: Webhook creado (incluye secret — solo en creación)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookWithSecret'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/tenants/{id}/webhooks/{webhookId}:
    delete:
      summary: Eliminar webhook
      operationId: deleteTenantWebhook
      tags: [webhooks]
      security:
        - AdminBearer: []
        - AdminToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Eliminado
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/audit:
    get:
      summary: Audit trail inmutable (admin)
      description: >
        Lista eventos de auditoría con paginación cursor (keyset). Requiere `PLATFORM_ADMIN_TOKEN`.
        Solo INSERT es posible en la tabla subyacente — sin UPDATE ni DELETE (inmutable por RLS).
      operationId: listAuditEvents
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: query
          required: false
          schema:
            type: string
          description: Filtrar por tenant_slug
        - name: action
          in: query
          required: false
          schema:
            type: string
          description: Filtrar por acción (ej. invitation.sent, tenant.suspended)
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Desde (ISO 8601)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Hasta (ISO 8601)
        - name: after
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Cursor de paginación (UUID del último elemento de la página anterior)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: Eventos de auditoría paginados
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        tenant_slug:
                          type: string
                        actor_email:
                          type: string
                        action:
                          type: string
                        resource:
                          type: string
                          nullable: true
                        metadata:
                          type: object
                          nullable: true
                        ip:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                          format: date-time
                  pagination:
                    type: object
                    properties:
                      limit:
                        type: integer
                      hasNextPage:
                        type: boolean
                      nextCursor:
                        type: string
                        format: uuid
                        nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/metrics:
    get:
      summary: Métricas globales Super Admin (portal JWT)
      description: >
        Agregados en PostgreSQL (tenants activos, ingresos del mes en `billing_usage`)
        y conteos BullMQ en Redis. Requiere JWT con `role=admin` o `is_superuser=true`.
      operationId: getSuperAdminMetrics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: KPI globales + serie de ingresos + BullMQ
          content:
            application/json:
              schema:
                type: object
                properties:
                  active_tenants:
                    type: integer
                  gross_revenue_month_usd:
                    type: number
                  revenue_last_months:
                    type: array
                    items:
                      type: object
                      properties:
                        month:
                          type: string
                        amount:
                          type: number
                  bullmq_pipeline_jobs:
                    type: integer
                  bullmq:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/admin/tenants:
    get:
      summary: Listado paginado de tenants (Super Admin)
      description: >
        Tabla de gestión con gasto del mes corriente por tenant (agregación SQL).
        Requiere JWT con `role=admin` o `is_superuser=true`.
      operationId: listSuperAdminTenants
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
            maximum: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Página de tenants
          content:
            application/json:
              schema:
                type: object
                properties:
                  limit:
                    type: integer
                  offset:
                    type: integer
                  total:
                    type: integer
                  tenants:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/invitations:
    post:
      summary: Enviar invitación (admin)
      operationId: postInvitation
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                slug:
                  type: string
                tenantRef:
                  type: string
                name:
                  type: string
                mode:
                  type: string
                  enum: [developer, managed]
      responses:
        '200':
          description: Invitación aceptada en flujo
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/webhooks/stripe:
    post:
      summary: Webhook Stripe (firma requerida si hay secret)
      operationId: postStripeWebhook
      requestBody:
        content:
          application/json:
            schema:
              type: object
      parameters:
        - name: Stripe-Signature
          in: header
          schema:
            type: string
      responses:
        '200':
          description: Siempre acknowledged con received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Admin `PLATFORM_ADMIN_TOKEN` o JWT Supabase según ruta.

  parameters:
    TenantRef:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: UUID o slug del tenant

  schemas:
    ErrorBody:
      type: object
      properties:
        error:
          type: string

    WebhookPublic:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_slug:
          type: string
        url:
          type: string
        events:
          type: array
          items:
            type: string
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WebhookWithSecret:
      allOf:
        - $ref: '#/components/schemas/WebhookPublic'
        - type: object
          properties:
            secret:
              type: string
              description: HMAC-SHA256 signing secret. Solo se devuelve en creación.

    CreateWebhookBody:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
          example: https://example.com/webhooks/opsly
        events:
          type: array
          items:
            type: string
            enum:
              - tenant.created
              - tenant.suspended
              - tenant.resumed
              - billing.paid
              - billing.failed
              - backup.completed
              - backup.failed
              - usage.threshold_reached
          minItems: 1

  responses:
    BadRequest:
      description: Validación o JSON inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Unauthorized:
      description: Sin autorización
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Forbidden:
      description: Prohibido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    NotFound:
      description: No encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    InternalError:
      description: Error interno
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
