# Rendered by orchestrator: replace {{PLACEHOLDERS}} then write docker-compose.yml per tenant.
# Do not run this file directly.

services:
  n8n_localrank:
    image: n8nio/n8n:latest
    container_name: n8n_localrank
    ports:
      - "8008:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: b6942285ed3b276ffbadd4b6972fb366d935d953846f0751
      N8N_ENCRYPTION_KEY: b8d11fed521d9d2c2120bb774779a5455dcbddd481cc3ffad6a50195e77b2dfb
      N8N_HOST: n8n-localrank.ops.smiletripcare.com
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n-localrank.ops.smiletripcare.com/
      DB_TYPE: sqlite
    volumes:
      - n8n_data_localrank:/home/node/.n8n
    networks:
      - traefik-public
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik-public"
      traefik.http.routers.n8n-localrank.rule: Host(`n8n-localrank.ops.smiletripcare.com`)
      traefik.http.routers.n8n-localrank.entrypoints: websecure
      traefik.http.routers.n8n-localrank.tls.certresolver: letsencrypt
      traefik.http.services.n8n-localrank.loadbalancer.server.port: "5678"
      traefik.http.routers.n8n-localrank.middlewares: secure-headers@file,rate-limit@file
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  uptime-kuma_localrank:
    image: louislam/uptime-kuma:1
    container_name: uptime_localrank
    ports:
      - "8009:3001"
    volumes:
      - uptime_data_localrank:/app/data
    networks:
      - traefik-public
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik-public"
      traefik.http.routers.uptime-localrank.rule: Host(`uptime-localrank.ops.smiletripcare.com`)
      traefik.http.routers.uptime-localrank.entrypoints: websecure
      traefik.http.routers.uptime-localrank.tls.certresolver: letsencrypt
      traefik.http.services.uptime-localrank.loadbalancer.server.port: "3001"
      traefik.http.routers.uptime-localrank.middlewares: secure-headers@file,rate-limit@file
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  n8n_data_localrank:
  uptime_data_localrank:

networks:
  traefik-public:
    external: true
