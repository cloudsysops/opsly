# Rendered by orchestrator: replace {{PLACEHOLDERS}} then write docker-compose.yml per tenant.
# Do not run this file directly.

services:
  n8n_intcloudsysops:
    image: n8nio/n8n:latest
    container_name: n8n_intcloudsysops
    ports:
      - '8004:5678'
    environment:
      N8N_BASIC_AUTH_ACTIVE: 'true'
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: 239028413e83170c4b9442852647c2d84560feb33ead9384
      N8N_ENCRYPTION_KEY: a23a9de637b4edd8a6d3241ecb05d2535654b4770d43f77c15ef1a180873d182
      N8N_HOST: n8n-intcloudsysops.ops.smiletripcare.com
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n-intcloudsysops.ops.smiletripcare.com/
      DB_TYPE: sqlite
    volumes:
      - n8n_data_intcloudsysops:/home/node/.n8n
    networks:
      - traefik-public
    labels:
      traefik.enable: 'true'
      traefik.docker.network: 'traefik-public'
      traefik.http.routers.n8n-intcloudsysops.rule: Host(`n8n-intcloudsysops.ops.smiletripcare.com`)
      traefik.http.routers.n8n-intcloudsysops.entrypoints: websecure
      traefik.http.routers.n8n-intcloudsysops.tls.certresolver: letsencrypt
      traefik.http.services.n8n-intcloudsysops.loadbalancer.server.port: '5678'
      traefik.http.routers.n8n-intcloudsysops.middlewares: secure-headers@file,rate-limit@file
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5678/healthz || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  uptime-kuma_intcloudsysops:
    image: louislam/uptime-kuma:1
    container_name: uptime_intcloudsysops
    ports:
      - '8005:3001'
    volumes:
      - uptime_data_intcloudsysops:/app/data
    networks:
      - traefik-public
    labels:
      traefik.enable: 'true'
      traefik.docker.network: 'traefik-public'
      traefik.http.routers.uptime-intcloudsysops.rule: Host(`uptime-intcloudsysops.ops.smiletripcare.com`)
      traefik.http.routers.uptime-intcloudsysops.entrypoints: websecure
      traefik.http.routers.uptime-intcloudsysops.tls.certresolver: letsencrypt
      traefik.http.services.uptime-intcloudsysops.loadbalancer.server.port: '3001'
      traefik.http.routers.uptime-intcloudsysops.middlewares: secure-headers@file,rate-limit@file
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  n8n_data_intcloudsysops:
  uptime_data_intcloudsysops:

networks:
  traefik-public:
    external: true
