# Rendered by orchestrator: replace {{PLACEHOLDERS}} then write docker-compose.yml per tenant.
# Do not run this file directly.

services:
  n8n_peskids:
    image: n8nio/n8n:latest
    container_name: n8n_peskids
    ports:
      - '8002:5678'
    environment:
      N8N_BASIC_AUTH_ACTIVE: 'true'
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: 2705d446c3c3389479a1b90c26db0ed6f86f2bd3a920c3be
      N8N_ENCRYPTION_KEY: e9c47b382c8f8b514be3341ec4288aec6e6c531bd3137f4371c96b0e2b174c79
      N8N_HOST: n8n-peskids.ops.smiletripcare.com
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n-peskids.ops.smiletripcare.com/
      DB_TYPE: sqlite
    volumes:
      - n8n_data_peskids:/home/node/.n8n
    networks:
      - traefik-public
    labels:
      traefik.enable: 'true'
      traefik.docker.network: 'traefik-public'
      traefik.http.routers.n8n-peskids.rule: Host(`n8n-peskids.ops.smiletripcare.com`)
      traefik.http.routers.n8n-peskids.entrypoints: websecure
      traefik.http.routers.n8n-peskids.tls.certresolver: letsencrypt
      traefik.http.services.n8n-peskids.loadbalancer.server.port: '5678'
      traefik.http.routers.n8n-peskids.middlewares: secure-headers@file,rate-limit@file
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5678/healthz || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  uptime-kuma_peskids:
    image: louislam/uptime-kuma:1
    container_name: uptime_peskids
    ports:
      - '8003:3001'
    volumes:
      - uptime_data_peskids:/app/data
    networks:
      - traefik-public
    labels:
      traefik.enable: 'true'
      traefik.docker.network: 'traefik-public'
      traefik.http.routers.uptime-peskids.rule: Host(`uptime-peskids.ops.smiletripcare.com`)
      traefik.http.routers.uptime-peskids.entrypoints: websecure
      traefik.http.routers.uptime-peskids.tls.certresolver: letsencrypt
      traefik.http.services.uptime-peskids.loadbalancer.server.port: '3001'
      traefik.http.routers.uptime-peskids.middlewares: secure-headers@file,rate-limit@file
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  n8n_data_peskids:
  uptime_data_peskids:

networks:
  traefik-public:
    external: true
