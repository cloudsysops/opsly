# Rendered by orchestrator: replace {{PLACEHOLDERS}} then write docker-compose.yml per tenant.
# Do not run this file directly.

services:
  n8n_legalvial:
    image: n8nio/n8n:latest
    container_name: n8n_legalvial
    ports:
      - '8010:5678'
    environment:
      N8N_BASIC_AUTH_ACTIVE: 'true'
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: 1983f27d4b337d6aa92904102dc63980eca88e3644b9c68b
      N8N_ENCRYPTION_KEY: 903990ef8c9c0f9a7023b727a792e2d27b2a450e4198345d3eb37f2aa8013d45
      N8N_HOST: n8n-legalvial.ops.smiletripcare.com
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n-legalvial.ops.smiletripcare.com/
      DB_TYPE: sqlite
    volumes:
      - n8n_data_legalvial:/home/node/.n8n
    networks:
      - traefik-public
    labels:
      traefik.enable: 'true'
      traefik.docker.network: 'traefik-public'
      traefik.http.routers.n8n-legalvial.rule: Host(`n8n-legalvial.ops.smiletripcare.com`)
      traefik.http.routers.n8n-legalvial.entrypoints: websecure
      traefik.http.routers.n8n-legalvial.tls.certresolver: letsencrypt
      traefik.http.services.n8n-legalvial.loadbalancer.server.port: '5678'
      traefik.http.routers.n8n-legalvial.middlewares: secure-headers@file,rate-limit@file
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:5678/healthz || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  uptime-kuma_legalvial:
    image: louislam/uptime-kuma:1
    container_name: uptime_legalvial
    ports:
      - '8011:3001'
    volumes:
      - uptime_data_legalvial:/app/data
    networks:
      - traefik-public
    labels:
      traefik.enable: 'true'
      traefik.docker.network: 'traefik-public'
      traefik.http.routers.uptime-legalvial.rule: Host(`uptime-legalvial.ops.smiletripcare.com`)
      traefik.http.routers.uptime-legalvial.entrypoints: websecure
      traefik.http.routers.uptime-legalvial.tls.certresolver: letsencrypt
      traefik.http.services.uptime-legalvial.loadbalancer.server.port: '3001'
      traefik.http.routers.uptime-legalvial.middlewares: secure-headers@file,rate-limit@file
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3001 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  n8n_data_legalvial:
  uptime_data_legalvial:

networks:
  traefik-public:
    external: true
