# Create the shared edge network once before first deploy:
#   docker network create traefik-public
#
# Interpolación ${VAR} en este archivo: el deploy usa `docker compose --env-file /opt/opsly/.env`
# (Compose por defecto solo lee .env junto al YAML en infra/, no la raíz del repo).
#
# Required en /opt/opsly/.env (non-exhaustive): PLATFORM_DOMAIN (base host, e.g. ops.smiletripcare.com),
# REDIS_PASSWORD, ACME_EMAIL, TRAEFIK_DASHBOARD_BASIC_AUTH_USERS (htpasswd; escapar $ en Compose),
# DOCKER_GID (GID del grupo del socket: stat -c %g /var/run/docker.sock; vps-bootstrap.sh lo añade),
# APP_IMAGE (optional). Los servicios también cargan env_file ../.env (= /opt/opsly/.env desde infra/).

services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    # El socket suele ser root:docker (660). La imagen Traefik corre sin root; group_add inyecta el GID del grupo
    # docker del host para que el proceso pueda usar /var/run/docker.sock (ver DOCKER_GID en .env).
    group_add:
      - "${DOCKER_GID:-999}"
    ports:
      - "80:80"
      - "443:443"
      # Depuración: dashboard Traefik con api.insecure (solo localhost en el VPS, no exponer a Internet).
      - "127.0.0.1:8080:8080"
    # Traefik v3.3+ negocia la API del daemon Docker de forma dinámica (compatible con Engine 29.x); evitar v3.1 con daemons que exigen mínimo ≥1.40.
    environment:
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - DOCKER_API_VERSION=1.40
    command:
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
    # Socket en solo lectura: el provider Docker solo necesita observar el daemon (ver ADR-005).
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - letsencrypt:/letsencrypt
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.middlewares.traefik-dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_BASIC_AUTH_USERS}"
      # Dashboard Traefik (no usar admin.* — reservado para la app Opsly Admin)
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${PLATFORM_DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-dashboard-auth@docker"
    networks:
      - traefik-public
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: ${APP_IMAGE:-ghcr.io/cloudsysops/intcloudsysops-api:latest}
    env_file:
      - ../.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      PLATFORM_TENANTS_DIR: /opt/opsly/tenants
      TEMPLATE_PATH: /opt/opsly/templates/docker-compose.tenant.yml.tpl
      # Prometheus en el host (VPS): desde el contenedor usar host-gateway, no localhost.
      PROMETHEUS_BASE_URL: ${PROMETHEUS_BASE_URL:-http://host.docker.internal:9090}
      ADMIN_PUBLIC_DEMO_READ: ${ADMIN_PUBLIC_DEMO_READ:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${PLATFORM_TENANTS_HOST_PATH:-/opt/opsly/tenants}:/opt/opsly/tenants
      - ./templates:/opt/opsly/templates:ro
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.app.rule=Host(`api.${PLATFORM_DOMAIN}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.app.service=app"
      - "traefik.http.routers.app.middlewares=secure-headers@file,rate-limit@file,compress@file"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
    networks:
      - traefik-public
      - internal
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 2

  admin:
    image: ${ADMIN_APP_IMAGE:-ghcr.io/cloudsysops/intcloudsysops-admin:latest}
    container_name: opsly_admin
    env_file:
      - ../.env
    environment:
      PORT: "3001"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.opsly-admin.rule=Host(`admin.${PLATFORM_DOMAIN}`)"
      - "traefik.http.routers.opsly-admin.entrypoints=websecure"
      - "traefik.http.routers.opsly-admin.tls=true"
      - "traefik.http.routers.opsly-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.opsly-admin.loadbalancer.server.port=3001"
    networks:
      - traefik-public
    restart: unless-stopped

  portal:
    image: ${PORTAL_APP_IMAGE:-ghcr.io/cloudsysops/intcloudsysops-portal:latest}
    container_name: opsly_portal
    env_file:
      - ../.env
    environment:
      PORT: "3002"
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_API_URL: https://api.${PLATFORM_DOMAIN}
      NEXT_PUBLIC_PLATFORM_DOMAIN: ${PLATFORM_DOMAIN}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.portal.rule=Host(`portal.${PLATFORM_DOMAIN}`)"
      - "traefik.http.routers.portal.entrypoints=websecure"
      - "traefik.http.routers.portal.tls=true"
      - "traefik.http.routers.portal.tls.certresolver=letsencrypt"
      - "traefik.http.services.portal.loadbalancer.server.port=3002"
    networks:
      - traefik-public
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mcp:
    image: ${MCP_IMAGE:-ghcr.io/cloudsysops/intcloudsysops-mcp:latest}
    container_name: opsly_mcp
    env_file:
      - ../.env
    environment:
      OPSLY_API_URL: https://api.${PLATFORM_DOMAIN}
      PLATFORM_ADMIN_TOKEN: ${PLATFORM_ADMIN_TOKEN}
      GITHUB_TOKEN_N8N: ${GITHUB_TOKEN_N8N}
      PORT: "3003"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.mcp.rule=Host(`mcp.${PLATFORM_DOMAIN}`)"
      - "traefik.http.routers.mcp.entrypoints=websecure"
      - "traefik.http.routers.mcp.tls=true"
      - "traefik.http.routers.mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.mcp.loadbalancer.server.port=3003"
    networks:
      - traefik-public
      - internal
    restart: unless-stopped

  llm-gateway:
    image: ${LLM_GATEWAY_IMAGE:-ghcr.io/cloudsysops/intcloudsysops-llm-gateway:latest}
    container_name: opsly_llm_gateway
    env_file:
      - ../.env
    environment:
      LLM_GATEWAY_PORT: "3010"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      CONTEXT_BUILDER_URL: http://context-builder:3012
      LLM_GATEWAY_REPO_CONTEXT: "true"
    depends_on:
      redis:
        condition: service_healthy
      context-builder:
        condition: service_started
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  orchestrator:
    image: ${ORCHESTRATOR_IMAGE:-ghcr.io/cloudsysops/intcloudsysops-orchestrator:latest}
    container_name: opsly_orchestrator
    env_file:
      - ../.env
    environment:
      ORCHESTRATOR_HEALTH_PORT: "3011"
      ORCHESTRATOR_LLM_GATEWAY_URL: http://llm-gateway:3010
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      GITHUB_TOKEN_N8N: ${GITHUB_TOKEN_N8N}
    depends_on:
      redis:
        condition: service_healthy
      llm-gateway:
        condition: service_started
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3011/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  context-builder:
    image: ${CONTEXT_BUILDER_IMAGE:-ghcr.io/cloudsysops/intcloudsysops-context-builder:latest}
    container_name: opsly_context_builder
    env_file:
      - ../.env
    environment:
      CONTEXT_BUILDER_PORT: "3012"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      OPS_REPO_ROOT: ${OPS_REPO_ROOT:-/opt/opsly}
      KNOWLEDGE_INDEX_PATH: ${KNOWLEDGE_INDEX_PATH:-/opt/opsly/config/knowledge-index.json}
    volumes:
      - ${OPS_REPO_HOST_PATH:-/opt/opsly}:/opt/opsly:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge
    internal: true

volumes:
  letsencrypt:
  redis_data:
