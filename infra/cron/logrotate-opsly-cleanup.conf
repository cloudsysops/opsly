# Instalar como /etc/logrotate.d/opsly-cleanup
/opt/opsly/logs/opsly-cleanup.log
/opt/opsly/logs/disk-alert-cron.log
/opt/opsly/logs/opsly-disk-alerts.log
/opt/opsly/logs/opsly-disk-monitor.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
}
