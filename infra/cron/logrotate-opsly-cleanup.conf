# Instalar como /etc/logrotate.d/opsly-cleanup
/opt/opsly/runtime/logs//opsly-cleanup.log
/opt/opsly/runtime/logs//disk-alert-cron.log
/opt/opsly/runtime/logs//opsly-disk-alerts.log
/opt/opsly/runtime/logs//opsly-disk-monitor.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
}
