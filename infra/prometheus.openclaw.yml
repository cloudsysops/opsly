global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Orchestrator metrics
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:3011']
        labels:
          service: 'openclaw-orchestrator'

  # LLM Gateway metrics
  - job_name: 'llm-gateway'
    static_configs:
      - targets: ['llm-gateway:3010']
        labels:
          service: 'llm-gateway'

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
