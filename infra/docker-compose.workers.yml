# Compose opcional: worker remoto Linux (p. ej. **opslyquantum**) con el repo montado.
# Uso desde la raíz del repo:
#   REDIS_URL='redis://…' docker compose -f infra/docker-compose.workers.yml --env-file .env.worker up -d
#
# Requisitos: REDIS_URL con credenciales alineadas al VPS (ver Doppler prd).
# Varias réplicas consumen la misma cola BullMQ (consumidores competidores):
# ajusta concurrencia antes de duplicar servicios.
#
# `deploy.resources` solo aplica en Docker Swarm; en Compose clásico se ignora.
# Ajusta memoria vía límites del host o una sola réplica.

services:
  worker-primary:
    image: node:20-bookworm-slim
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      WORKER_ID: ${WORKER_ID:-opslyquantum-worker-01}
      OPSLY_ORCHESTRATOR_ROLE: ${OPSLY_ORCHESTRATOR_ROLE:-worker}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in environment or .env.worker}
      OPSLY_API_INTERNAL_URL: ${OPSLY_API_INTERNAL_URL:-}
    command:
      - bash
      - -lc
      - npm ci && npm run build --workspace=@intcloudsysops/orchestrator && exec npm run start --workspace=@intcloudsysops/orchestrator
    restart: unless-stopped
    network_mode: host

  worker-llm:
    profiles:
      - llm-split
    image: node:20-bookworm-slim
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      WORKER_ID: ${WORKER_ID:-opslyquantum-llm-01}
      OPSLY_ORCHESTRATOR_ROLE: ${OPSLY_ORCHESTRATOR_ROLE:-worker}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in environment or .env.worker}
    command:
      - bash
      - -lc
      - npm ci && npm run build --workspace=@intcloudsysops/orchestrator && exec npm run start --workspace=@intcloudsysops/orchestrator
    restart: unless-stopped
    network_mode: host
