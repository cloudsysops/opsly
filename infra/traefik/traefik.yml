# Traefik v3 — static configuration (secrets: ACME email via env on the traefik container,
# e.g. TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL)

log:
  level: INFO

accessLog: {}

# Dashboard habilitado pero sin api.insecure — acceso solo vía router Traefik con auth middleware.
api:
  dashboard: true

entryPoints:
  web:
    address: ':80'
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ':443'

# Provider Docker: endpoint explícito al socket del host
# exposedByDefault: false = solo contenedores con traefik.enable=true; network = IP del backend en traefik-public.
providers:
  docker:
    endpoint: 'unix:///var/run/docker.sock'
    exposedByDefault: false
    network: traefik-public
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: '20'
