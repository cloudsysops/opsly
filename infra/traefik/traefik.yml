# Traefik v3 — static configuration (secrets: ACME email via env on the traefik container,
# e.g. TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL)

log:
  level: INFO

accessLog: {}

# insecure: true expone el dashboard/API en :8080 sin TLS (solo depuración; no usar en producción pública).
api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

# Provider Docker: endpoint explícito al socket del host; sin esto Traefik v3 puede negociar API 1.24 y fallar con daemons recientes.
# exposedByDefault: false = solo contenedores con traefik.enable=true; network = IP del backend en traefik-public.
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik-public
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      storage: /letsencrypt/acme.json
      tlsChallenge: {}
