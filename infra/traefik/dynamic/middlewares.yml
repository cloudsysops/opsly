# Traefik v3 — dynamic middlewares (file provider)
# Reference from Docker labels: secure-headers@file, rate-limit@file, compress@file, redirect-to-https@file

http:
  middlewares:
    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        referrerPolicy: strict-origin-when-cross-origin

    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    compress:
      compress: {}

    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
